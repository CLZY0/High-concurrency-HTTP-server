<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>TinyHTTPServer</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 60px auto; color: #333; }
        h1   { color: #2c3e50; }
        .info { background: #ecf0f1; padding: 20px; border-radius: 8px; }
        code { background: #dfe6e9; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>TinyHTTPServer 运行成功！</h1>
    <div class="info">
        <p>这是一个基于 <strong>Reactor + epoll + 线程池</strong> 的高并发 HTTP 服务器。</p>
        <p>当前服务器支持：</p>
        <ul>
            <li>GET 静态文件服务</li>
            <li>HTTP/1.1 长连接（keep-alive）</li>
            <li>连接超时自动断开（60秒）</li>
            <li>多线程处理请求</li>
        </ul>
    </div>
    <p>用 <code>wrk -t4 -c10000 -d60s http://localhost:8080/</code> 进行压测</p>
</body>
</html>
